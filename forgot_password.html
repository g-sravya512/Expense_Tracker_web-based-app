<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forgot Password</title>
<link rel="stylesheet" href="lo_reg.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

<div class="login_page">
  <h3>Expense Tracker</h3>
  <hr>

  <form class="form" onsubmit="return false;">

    Email :
    <input type="email" id="fp_email" placeholder="Enter registered email"><br>

    <button type="button" onclick="resetPasswordFirebase()" class="otp">
      Send Reset Link
    </button>

    <p style="text-align:center; font-size:13px; color:gray;">
      Check your email to reset your password
    </p>

    <p><a href="login.html">Back to Login</a></p>

  </form>
</div>

<script type="module" src="Expense_tracker.js"></script>
</body>
</html>
