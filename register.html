<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Page</title>
    <link rel="stylesheet" href="lo_reg.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
    <div class="reg_page">
        <h1>Expense Tracker</h1>
        <hr>
        <form class="form">
            Email : <input type="email" id="regemail" placeholder="Enter email">
            Password :
            <div class="password-container">
                <input type="password" id="regpassword" placeholder="Enter password">
                <span class="eye" onclick="togglePassword(this)"><i class="fa-regular fa-eye"></i></span>
            </div>
            
            Confirm Password :
            <div class="password-container">
                <input type="password" id="conpassword" placeholder="Enter password">
                <span class="eye" onclick="togglePassword(this)"><i class="fa-regular fa-eye"></i></span>
            </div>
            <input type="button" id="res_but" value="Register" onclick="registerUser()">
            <p>Already have account?<a href="login.html">Login</a></p>
        </form>
    </div>
    <script type="module" src="Expense_tracker.js"></script>
</body>
</html>
